name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npx cap add android
      - run: npx @capacitor/assets generate --android --iconBackgroundColor '#9a7520' --iconBackgroundColorDark '#9a7520' --splashBackgroundColor '#0d0b07' --splashBackgroundColorDark '#0d0b07'
      - run: npx cap sync android
      - name: Build unsigned release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Sign release APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.p12
          BT="$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)"
          U=android/app/build/outputs/apk/release/app-release-unsigned.apk
          "$BT/zipalign" -f 4 "$U" aligned.apk
          "$BT/apksigner" sign --ks release.p12 --ks-type PKCS12 \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --out gematria-release.apk aligned.apk
          "$BT/apksigner" verify --print-certs gematria-release.apk
      - uses: actions/upload-artifact@v4
        with:
          name: gematria-apk-signed
          path: gematria-release.apk
          if-no-files-found: error
